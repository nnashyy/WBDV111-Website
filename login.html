<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Babies Baby Products Trading</title>
    <link rel="stylesheet" href="loginstyle.css">
    <link rel="stylesheet" href="common.css">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="top-bar"></div>
        <nav class="navbar">
            <div class="logo-container">
                <div class="logo">
                    <a href="index.html">Babies <span>Baby Products Trading</span></a>
                </div>
            </div>
            
            <div class="nav-links-container">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="pages.html">About</a></li>
                    <li><a href="shop.html">Shop</a></li>
                </ul>
            </div>
            
            <div class="nav-buttons-container">
                <div class="nav-buttons">
                </div>
            </div>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </main>

    <footer class="site-footer">
        <h3>Babies Baby Products Trading</h3>
        <p>Sign in to manage your cart, checkout faster, and keep your favorite essentials close.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
