<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Babies Baby Products Trading</title>
    <link rel="stylesheet" href="checkoutstyle.css">
    <link rel="stylesheet" href="common.css">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="top-bar"></div>
        <nav class="navbar">
            <div class="logo-container">
                <div class="logo">
                    <a href="index.html">Babies <span>Baby Products Trading</span></a>
                </div>
            </div>
            
            <div class="nav-links-container">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="pages.html">About</a></li>
                    <li><a href="shop.html">Shop</a></li>
                </ul>
            </div>
            
            <div class="nav-buttons-container">
                <div class="nav-buttons">
                    <button class="nav-auth-btn" onclick="window.location.href='shop.html'">Continue Shopping</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="checkout-container">
        <div class="checkout-form-section">
            <h2>Billing Details</h2>
            <form id="checkout-form">
                <div class="input-group">
                    <label for="fname">Full Name</label>
                    <input type="text" id="fname" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label for="address">Shipping Address</label>
                    <input type="text" id="address" required>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label for="city">City</label>
                        <input type="text" id="city" required>
                    </div>
                    <div class="input-group">
                        <label for="zip">Zip Code</label>
                        <input type="text" id="zip" required>
                    </div>
                </div>

                <h2>Payment Method</h2>
                <div class="payment-options">
                    <label class="payment-label">
                        <input type="radio" name="payment" value="card" checked> Credit/Debit Card
                    </label>
                    
                    <div id="card-details" class="card-details-form">
                        <div class="input-group">
                            <label for="cardNumber">Card Number</label>
                            <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label for="expDate">Expiry Date</label>
                                <input type="text" id="expDate" placeholder="MM/YY" maxlength="5" required>
                            </div>
                            <div class="input-group">
                                <label for="cvv">CVV</label>
                                <input type="password" id="cvv" placeholder="123" maxlength="4" required>
                            </div>
                        </div>
                    </div>

                    <label class="payment-label">
                        <input type="radio" name="payment" value="gcash"> GCash/E-Wallet
                    </label>

                    <label class="payment-label">
                        <input type="radio" name="payment" value="cod"> Cash on Delivery
                    </label>
                </div>
            </form>
        </div>

        <div class="order-summary">
            <h2>Order Summary</h2>
            <div class="summary-items" id="summary-items">
            </div>
            <hr>
            <div class="summary-totals">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">₱0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="summary-shipping">₱50.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="summary-total">₱0.00</span>
                </div>
            </div>
            <button type="submit" form="checkout-form" class="place-order-btn">Place Order</button>
        </div>
    </main>

    <footer class="site-footer">
        <h3>Babies Baby Products Trading</h3>
        <p>Review every detail with confidence before placing an order for your growing family.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
